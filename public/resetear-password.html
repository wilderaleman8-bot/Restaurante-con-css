<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabores Ancestrales | Restablecer Contraseña</title>
  <meta name="description" content="Restablece tu contraseña de Sabores Ancestrales.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="imagenes/Logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-card {
      max-width: 440px;
      margin: 30px auto 0;
      background: #fff;
      padding: 28px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .auth-card h3 {
      color: var(--wood);
      margin-bottom: 16px;
      font-size: 1.2rem;
    }
    .auth-card p {
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 0.95rem;
    }
    .auth-card label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--wood);
      font-size: 0.9rem;
    }
    .auth-card input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 14px;
      outline: none;
      font-size: 0.95rem;
    }
    .auth-card button {
      background: var(--wood);
      color: #fff;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.25s ease;
      font-size: 0.9rem;
      width: 100%;
    }
    .auth-card button:hover {
      background: var(--accent);
    }
    .auth-link {
      text-align: center;
      margin-top: 16px;
    }
    .auth-link a {
      color: var(--wood);
      font-weight: 600;
    }
    .auth-link a:hover {
      color: var(--accent);
    }
    #reset-form-container {
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="container navbar">
      <div class="logo">
        <img src="imagenes/Logo.jpg" alt="Logo Sabores Ancestrales" width="34" height="34">
        <span>Sabores Ancestrales</span>
      </div>
      <button id="menu-toggle">☰</button>
      <ul id="nav-links" class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="informacion.html">Información</a></li>
        <li><a href="menu.html">Platillos</a></li>
        <li><a href="reservas.html">Reservas</a></li>
        <li><a href="valoracion.html">Valoración</a></li>
        <li><a href="opiniones.html">Opiniones</a></li>
      </ul>
      <div id="user-panel" class="user-panel"></div>
    </div>
  </header>

  <section>
    <div class="container">
      <h2>Restablecer Contraseña</h2>
      <p class="lead">Ingresa tu nueva contraseña.</p>

      <div class="auth-card">
        <div id="reset-message"></div>
        <div id="reset-form-container">
          <form id="reset-password-form">
            <label for="new-password">Nueva contraseña</label>
            <input type="password" id="new-password" name="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6">

            <label for="confirm-password">Confirmar contraseña</label>
            <input type="password" id="confirm-password" name="confirm_password" placeholder="Repite la contraseña" autocomplete="new-password" required minlength="6">

            <button type="submit">Restablecer contraseña</button>
          </form>
        </div>
        <div class="auth-link" id="reset-link-container" style="display:none;">
          <a href="login.html">Volver a iniciar sesión</a>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container footer-content">
      <div class="social-links">
        <a href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">f</a>
        <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">◉</a>
        <a href="https://wa.me/50588888888" target="_blank" rel="noopener" aria-label="WhatsApp">💬</a>
      </div>
      <p>&copy; 2025 Sabores Ancestrales. Todos los derechos reservados.</p>
    </div>
  </footer>
  <button id="back-to-top" aria-label="Volver arriba">↑</button>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const msg = document.getElementById('reset-message');
      const formContainer = document.getElementById('reset-form-container');
      const linkContainer = document.getElementById('reset-link-container');

      const BACKEND_URL = window.location.port === '80' || window.location.port === '443' || window.location.port === ''
        ? 'http://localhost:3000' : window.location.origin;

      if (!token) {
        msg.innerHTML = '<div class="error-msg">Token de recuperación no proporcionado. <a href="solicitar-reset.html">Solicita uno nuevo</a>.</div>';
        return;
      }

      try {
        const verifyRes = await fetch(`${BACKEND_URL}/api/password-reset/verificar`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });

        if (!verifyRes.ok) {
          msg.innerHTML = '<div class="error-msg">El enlace de recuperación es inválido o ha expirado. <a href="solicitar-reset.html">Solicita uno nuevo</a>.</div>';
          return;
        }

        formContainer.style.display = 'block';

        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const password = e.target.password.value;
          const confirmPassword = e.target.confirm_password.value;
          const btn = e.target.querySelector('button');

          if (password !== confirmPassword) {
            msg.innerHTML = '<div class="error-msg">Las contraseñas no coinciden.</div>';
            return;
          }

          if (password.length < 6) {
            msg.innerHTML = '<div class="error-msg">La contraseña debe tener al menos 6 caracteres.</div>';
            return;
          }

          btn.disabled = true;
          btn.textContent = 'Restableciendo...';

          try {
            const res = await fetch(`${BACKEND_URL}/api/password-reset/cambiar`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token, password })
            });

            const data = await res.json();

            if (!res.ok) {
              msg.innerHTML = `<div class="error-msg">${data.error || 'Error al restablecer la contraseña.'}</div>`;
              btn.disabled = false;
              btn.textContent = 'Restablecer contraseña';
              return;
            }

            msg.innerHTML = '<div class="success-msg">Contraseña restablecida con éxito. <a href="login.html">Inicia sesión</a></div>';
            formContainer.style.display = 'none';
            linkContainer.style.display = 'block';
          } catch (err) {
            msg.innerHTML = '<div class="error-msg">Error al conectar con el servidor. Intenta de nuevo.</div>';
            btn.disabled = false;
            btn.textContent = 'Restablecer contraseña';
          }
        });
      } catch (err) {
        msg.innerHTML = '<div class="error-msg">Error al conectar con el servidor. Intenta de nuevo.</div>';
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
