<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabores Ancestrales | Opiniones</title>
  <meta name="description" content="Lee las opiniones de nuestros clientes en Sabores Ancestrales. Déjanos tu comentario sobre tu experiencia gastronómica.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="imagenes/Logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <div class="logo">
        <img src="imagenes/Logo.jpg" alt="Logo Sabores Ancestrales" width="34" height="34">
        <span>Sabores Ancestrales</span>
      </div>
      <button id="menu-toggle">☰</button>
      <ul id="nav-links" class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="informacion.html">Información</a></li>
        <li><a href="menu.html">Platillos</a></li>
        <li><a href="reservas.html">Reservas</a></li>
        <li><a href="valoracion.html">Valoración</a></li>
        <li><a href="opiniones.html" class="active">Opiniones</a></li>
      </ul>
      <div id="user-panel" class="user-panel"></div>
    </div>
  </header>

  <section>
    <div class="container">
      <h2>Opiniones de Nuestros Clientes</h2>
      <p class="lead">Tu voz importa. Deja tu comentario sobre tu experiencia.</p>

      <form id="opinion-form" class="form-card">
        <div class="form-row">
          <div>
            <label for="nombre">Nombre</label>
            <input type="text" name="nombre" id="nombre" required>
          </div>
          <div>
            <label for="apellido">Apellidos</label>
            <input type="text" name="apellido" id="apellido" required>
          </div>
        </div>
        <div class="form-row full">
          <label for="comentario">Comentario</label>
          <textarea name="comentario" id="comentario" rows="3" maxlength="300" placeholder="Máximo 300 caracteres" required></textarea>
        </div>
        <button type="submit" class="btn">Enviar Opinión</button>
        <div id="opinion-message" class="form-message"></div>
      </form>
    </div>
  </section>

  <footer>
    <div class="container footer-content">
      <div class="social-links">
        <a href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">f</a>
        <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">◉</a>
        <a href="https://wa.me/50588888888" target="_blank" rel="noopener" aria-label="WhatsApp">💬</a>
      </div>
      <p>&copy; 2025 Sabores Ancestrales. Todos los derechos reservados.</p>
    </div>
  </footer>
  <button id="back-to-top" aria-label="Volver arriba">↑</button>

  <!-- JavaScript -->
  <script src="js/app.js"></script>
</body>
</html>
