<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabores Ancestrales | Login</title>
  <meta name="description" content="Inicia sesión en Sabores Ancestrales para acceder a tu perfil, historial de pedidos y reservas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="imagenes/Logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-card {
      max-width: 440px;
      margin: 30px auto 0;
      background: #fff;
      padding: 28px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .auth-card h3 {
      color: var(--wood);
      margin-bottom: 16px;
      font-size: 1.2rem;
    }
    .auth-card p {
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 0.95rem;
    }
    .auth-card label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--wood);
      font-size: 0.9rem;
    }
    .auth-card input[type="email"],
    .auth-card input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-bottom: 14px;
      outline: none;
      font-size: 0.95rem;
    }
    .auth-card button:not(.pw-toggle) {
      background: var(--wood);
      color: #fff;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.25s ease;
      font-size: 0.9rem;
      width: 100%;
    }
    .auth-card button:not(.pw-toggle):hover {
      background: var(--accent);
    }
    .auth-message {
      min-height: 20px;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .auth-hint {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }
    .auth-hint span {
      background: #f3ece4;
      color: var(--wood);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }
    .auth-link {
      text-align: center;
      margin-top: 16px;
    }
    .auth-link a {
      color: var(--wood);
      font-weight: 600;
    }
    .auth-link a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="container navbar">
      <div class="logo">
        <img src="imagenes/Logo.jpg" alt="Logo Sabores Ancestrales" width="34" height="34">
        <span>Sabores Ancestrales</span>
      </div>
      <button id="menu-toggle">☰</button>
      <ul id="nav-links" class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="informacion.html">Información</a></li>
        <li><a href="menu.html">Platillos</a></li>
        <li><a href="reservas.html">Reservas</a></li>
        <li><a href="valoracion.html">Valoración</a></li>
        <li><a href="opiniones.html">Opiniones</a></li>
      </ul>
      <div id="user-panel" class="user-panel"></div>
    </div>
  </header>

  <section>
    <div class="container">
      <h2>Iniciar sesión</h2>
      <p class="lead">Ingresa tus datos para acceder a tu perfil.</p>

      <div class="auth-card">
        <form id="login-form">
          <div class="auth-message" id="login-message"></div>
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" name="email" placeholder="correo@ejemplo.com" autocomplete="username" required>

          <label for="login-password">Contraseña</label>
          <div class="pw-wrap">
            <input type="password" id="login-password" name="password" placeholder="Tu contraseña" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" data-for="login-password">👁</button>
          </div>

          <button type="submit">Entrar a mi cuenta</button>
          <p style="margin-top:14px;text-align:center;"><a href="solicitar-reset.html" style="color:var(--wood);font-size:0.9rem;">¿Olvidaste tu contraseña?</a></p>
        </form>
        <div class="auth-link">
          ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container footer-content">
      <div class="social-links">
        <a href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">f</a>
        <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">◉</a>
        <a href="https://wa.me/50588888888" target="_blank" rel="noopener" aria-label="WhatsApp">💬</a>
      </div>
      <p>© 2025 Sabores Ancestrales. Todos los derechos reservados.</p>
    </div>
  </footer>
  <button id="back-to-top" aria-label="Volver arriba">↑</button>

  <script src="js/app.js"></script>
</body>
</html>
