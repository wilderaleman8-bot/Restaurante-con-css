<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabores Ancestrales | Pedidos</title>
  <link rel="icon" href="../imagenes/Logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#admin-main" class="skip-link" style="position:fixed;top:-100%;left:50%;z-index:9999;transform:translateX(-50%);background:#5a4036;color:#fff;padding:12px 24px;border-radius:0 0 12px 12px;font-weight:700;font-size:0.95rem;text-decoration:none;transition:top .2s ease">Saltar al contenido principal</a>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <img src="../imagenes/Logo.jpg" alt="Logo">
        <div>
          <span>Sabores Ancestrales</span>
          <small>Panel Admin</small>
        </div>
      </div>
      <nav class="sidebar-nav" aria-label="Navegación del panel">
        <a href="index.html"><span class="icon">📊</span> Dashboard</a>
        <a href="pedidos.html"><span class="icon">📋</span> Pedidos</a>
        <a href="reservas.html"><span class="icon">📅</span> Reservas</a>
        <a href="menu.html"><span class="icon">🍽️</span> Menú</a>
        <a href="usuarios.html"><span class="icon">👥</span> Usuarios</a>
        <a href="opiniones.html"><span class="icon">💬</span> Opiniones</a>
        <a href="reportes.html"><span class="icon">📈</span> Reportes</a>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn">Cerrar sesión</button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="admin-main" id="admin-main" tabindex="-1">
      <header class="admin-header">
        <button id="sidebar-toggle">☰</button>
        <h1>Gestión de Pedidos</h1>
        <div class="admin-user" id="admin-user-info"></div>
      </header>

      <div class="admin-content">
        <div class="admin-filters">
          <input type="text" id="search-input" placeholder="Buscar por cliente...">
          <select id="status-filter">
            <option value="">Todos los estados</option>
            <option value="pendiente">Pendiente</option>
            <option value="preparando">Preparando</option>
            <option value="servido">Servido</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>

        <div class="admin-table-wrap">
          <h3>Todos los pedidos</h3>
          <div style="overflow-x:auto;">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Cliente</th>
                  <th>Platillos</th>
                  <th>Total</th>
                  <th>Método</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="orders-body">
                <tr><td colspan="7" style="padding:0;border:none;"><div id="orders-skeleton"><div class="skeleton-row"><div class="skeleton-cell w-20"></div><div class="skeleton-cell w-20"></div><div class="skeleton-cell w-25"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-15"></div></div><div class="skeleton-row"><div class="skeleton-cell w-20"></div><div class="skeleton-cell w-20"></div><div class="skeleton-cell w-25"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-15"></div></div><div class="skeleton-row"><div class="skeleton-cell w-20"></div><div class="skeleton-cell w-20"></div><div class="skeleton-cell w-25"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-10"></div><div class="skeleton-cell w-15"></div></div></div></td></tr>
              </tbody>
            </table>
          </div>
          <div id="pagination" style="display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:8px;padding:12px 0;"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="app.js?v=6"></script>
  <script>
    let ordersData = [];
    let currentPage = 0;
    const PAGE_SIZE = 20;
    let totalCount = 0;

    function renderPagination() {
      const totalPages = Math.ceil(totalCount / PAGE_SIZE);
      if (totalPages <= 1) {
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      document.getElementById('pagination').innerHTML = `
        <button class="btn-small" ${currentPage === 0 ? 'disabled' : ''} id="prev-page">← Anterior</button>
        <span style="font-size:0.85rem;color:var(--muted)">Pág. ${currentPage + 1} de ${totalPages}</span>
        <button class="btn-small" ${currentPage >= totalPages - 1 ? 'disabled' : ''} id="next-page">Siguiente →</button>
      `;
      document.getElementById('prev-page')?.addEventListener('click', () => { if (currentPage > 0) { currentPage--; loadOrders(); } });
      document.getElementById('next-page')?.addEventListener('click', () => { if (currentPage < totalPages - 1) { currentPage++; loadOrders(); } });
    }

    function renderOrders(orders) {
      const tbody = document.getElementById('orders-body');
      if (!orders.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><p>No hay pedidos registrados</p></td></tr>';
        return;
      }

      tbody.innerHTML = orders.map(o => {
        const fecha = o.created_at ? new Date(o.created_at).toLocaleString('es-ES') : (o.fecha || '—');
        const cliente = o.usuario?.nombre || o.nombre || o.cliente || o.usuario_nombre || '—';
        const total = o.total ? `C$${Number(o.total).toFixed(2)}` : '—';
        const metodo = o.metodo_pago || '—';
        const status = o.status || 'pendiente';

        const detalle = Array.isArray(o.detalle)
          ? o.detalle.map(d => `${d.nombre || d.name || '?'}${d.cantidad ? ` x${d.cantidad}` : ''}`).join(', ')
          : (typeof o.detalle === 'string' ? o.detalle : '—');

        const opciones = ['pendiente', 'preparando', 'servido', 'cancelado'];
        const disabled = status === 'servido' || status === 'cancelado';

        return `
          <tr>
            <td>${fecha}</td>
            <td>${cliente}</td>
            <td style="max-width:220px;white-space:normal;word-break:break-word;">${detalle}</td>
            <td>${total}</td>
            <td>${metodo}</td>
            <td><span class="badge ${status}">${status}</span></td>
            <td>
              ${disabled ? '<span style="color:var(--muted);font-size:0.8rem">Finalizado</span>' : `
               <div class="actions">
                <select class="status-select" data-id="${o.id}" style="padding:4px 8px;border-radius:6px;border:1px solid #ccc;font-size:0.8rem">
                  ${opciones.map(s => `<option value="${s}" ${s === status ? 'selected' : ''}>${s}</option>`).join('')}
                </select>
                <button class="btn-small primary btn-update-status" data-id="${o.id}">Actualizar</button>
              </div>`}
            </td>
          </tr>
        `;
      }).join('');
    }

    function filterOrders() {
      const search = document.getElementById('search-input').value.toLowerCase().trim();
      const status = document.getElementById('status-filter').value;
      let filtered = ordersData;
      if (search) {
        filtered = filtered.filter(o => {
          const cliente = (o.usuario?.nombre || o.nombre || o.cliente || o.usuario_nombre || '').toLowerCase();
          return cliente.includes(search);
        });
      }
      if (status) {
        filtered = filtered.filter(o => (o.status || 'pendiente') === status);
      }
      renderOrders(filtered);
    }

    async function updateStatus(id) {
      const select = document.querySelector(`.status-select[data-id="${id}"]`);
      if (!select) { showToast('No se encontró el selector', 'error'); return; }
      const newStatus = select.value;
      try {
        await apiFetch(`/api/admin/pedidos/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ status: newStatus })
        });
        showToast(`Pedido actualizado a "${newStatus}"`, 'success');
        await loadOrders();
      } catch (e) {
        showToast(e.message || 'Error al actualizar', 'error');
      }
    }

    async function loadOrders() {
      try {
        const res = await fetch(`/api/admin/pedidos?page=${currentPage}&limit=${PAGE_SIZE}`, {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('saboresToken')}` }
        });
        if (!res.ok) throw new Error('Error al cargar');
        totalCount = parseInt(res.headers.get('X-Total-Count')) || 0;
        const data = await res.json();
        ordersData = Array.isArray(data) ? data : [];
        filterOrders();
        renderPagination();
      } catch (e) {
        document.getElementById('orders-body').innerHTML =
          '<tr><td colspan="7" class="empty-state"><p>Error al cargar pedidos</p></td></tr>';
      }
    }

    document.addEventListener('click', e => {
      const btn = e.target.closest('.btn-update-status');
      if (!btn) return;
      updateStatus(btn.dataset.id);
    });

    document.addEventListener('DOMContentLoaded', () => {
      loadOrders();
      setInterval(loadOrders, 30000);
      document.getElementById('search-input').addEventListener('input', () => { currentPage = 0; filterOrders(); });
      document.getElementById('status-filter').addEventListener('change', () => { currentPage = 0; filterOrders(); });

      escucharSocket('new-order', () => { currentPage = 0; loadOrders(); });
      escucharSocket('order-status', () => { currentPage = 0; loadOrders(); });
    });
  </script>
</body>
</html>
