<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sabores Ancestrales | Reportes</title>
  <link rel="icon" href="../imagenes/Logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="style.css">
  <style>
    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .report-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 18px;
      box-shadow: 0 6px 18px var(--shadow);
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }
    .report-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }
    .report-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }
    .report-card.card-orange::before { background: linear-gradient(90deg, #e65100, #ff9800); }
    .report-card.card-blue::before { background: linear-gradient(90deg, #1565c0, #42a5f5); }
    .report-card.card-green::before { background: linear-gradient(90deg, #2e7d32, #66bb6a); }
    .report-card.card-gold::before { background: linear-gradient(90deg, #f9a825, #ffd54f); }
    .report-card.card-purple::before { background: linear-gradient(90deg, #6a1b9a, #ab47bc); }

    .report-card .r-icon {
      font-size: 1.6rem;
      margin-bottom: 6px;
    }
    .report-card .num {
      font-size: 2rem;
      font-family: var(--font-heading);
      color: var(--wood);
      font-weight: 700;
      line-height: 1.1;
    }
    .report-card .num.gold { color: #e65100; }
    .report-card .num.green { color: #2e7d32; }
    .report-card .num.blue { color: #1565c0; }
    .report-card .label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      margin-top: 2px;
    }
    .report-card .sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      opacity: 0.7;
    }

    .report-bottom {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .report-panel {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px var(--shadow);
      overflow: hidden;
    }
    .report-panel h3 {
      font-family: var(--font-heading);
      color: var(--wood);
      font-size: 1rem;
      padding: 18px 22px;
      margin: 0;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .report-panel-body {
      padding: 18px 22px;
    }

    .status-chart {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-row .s-label {
      width: 100px;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .status-row .s-bar-wrap {
      flex: 1;
      height: 20px;
      background: #f0ede8;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }
    .status-row .s-bar {
      height: 100%;
      border-radius: 999px;
      transition: width 0.8s ease;
      min-width: 0;
    }
    .status-row .s-bar.pendiente { background: linear-gradient(90deg, #ffc107, #ffb300); }
    .status-row .s-bar.preparando { background: linear-gradient(90deg, #42a5f5, #1e88e5); }
    .status-row .s-bar.servido { background: linear-gradient(90deg, #66bb6a, #43a047); }
    .status-row .s-bar.cancelado { background: linear-gradient(90deg, #ef5350, #d32f2f); }
    .status-row .s-count {
      width: 36px;
      text-align: right;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--wood);
    }

    .popular-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .popular-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f5f1eb;
      font-size: 0.88rem;
    }
    .popular-list li:last-child { border-bottom: none; }
    .popular-list .rank {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .popular-list .rank.gold { background: #fff3cd; color: #f57f17; }
    .popular-list .rank.silver { background: #f5f5f5; color: #616161; }
    .popular-list .rank.bronze { background: #fbe9e7; color: #bf360c; }
    .popular-list .rank.normal { background: #f5f1eb; color: var(--muted); }
    .popular-list .p-name {
      flex: 1;
      font-weight: 500;
    }
    .popular-list .p-count {
      background: var(--olive);
      color: #fff;
      padding: 2px 14px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .ingresos-total {
      text-align: center;
      padding: 12px;
      margin-top: 4px;
      background: linear-gradient(135deg, #fef9e7, #fdebd0);
      border-radius: 12px;
    }
    .ingresos-total .label-small {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      font-weight: 600;
    }
    .ingresos-total .num-big {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 700;
      color: #e65100;
    }

    @media (max-width: 768px) {
      .report-grid { gap: 8px; }
      .report-card { padding: 12px 10px; }
      .report-card .num { font-size: 1.3rem; }
      .report-card .r-icon { font-size: 1.2rem; margin-bottom: 2px; }
      .report-card .label { font-size: 0.6rem; }
      .report-bottom { grid-template-columns: 1fr; gap: 12px; }
      .report-panel h3 { font-size: 0.85rem; padding: 12px 14px; }
      .report-panel-body { padding: 12px 14px; }
      .status-row .s-label { width: 70px; font-size: 0.72rem; }
      .popular-list li { font-size: 0.78rem; padding: 7px 0; gap: 8px; }
      .popular-list .rank { width: 22px; height: 22px; font-size: 0.65rem; }
      .ingresos-total .num-big { font-size: 1rem; }
    }
    @media (max-width: 480px) {
      .status-row .s-label { width: 55px; font-size: 0.65rem; }
      .status-row .s-count { width: 30px; font-size: 0.78rem; }
      .status-row .s-bar-wrap { height: 16px; }
      .status-chart { gap: 8px; }
      .status-row { gap: 6px; }
    }
  </style>
</head>
<body>
  <a href="#admin-main" class="skip-link" style="position:fixed;top:-100%;left:50%;z-index:9999;transform:translateX(-50%);background:#5a4036;color:#fff;padding:12px 24px;border-radius:0 0 12px 12px;font-weight:700;font-size:0.95rem;text-decoration:none;transition:top .2s ease">Saltar al contenido principal</a>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-brand">
        <img src="../imagenes/Logo.jpg" alt="Logo">
        <div>
          <span>Sabores Ancestrales</span>
          <small>Panel Admin</small>
        </div>
      </div>
      <nav class="sidebar-nav" aria-label="Navegación del panel">
        <a href="index.html"><span class="icon">📊</span> Dashboard</a>
        <a href="pedidos.html"><span class="icon">📋</span> Pedidos</a>
        <a href="reservas.html"><span class="icon">📅</span> Reservas</a>
        <a href="menu.html"><span class="icon">🍽️</span> Menú</a>
        <a href="usuarios.html"><span class="icon">👥</span> Usuarios</a>
        <a href="opiniones.html"><span class="icon">💬</span> Opiniones</a>
        <a href="reportes.html"><span class="icon">📈</span> Reportes</a>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn">Cerrar sesión</button>
      </div>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="admin-main" id="admin-main" tabindex="-1">
      <header class="admin-header">
        <button id="sidebar-toggle">☰</button>
        <h1>Reportes</h1>
        <div class="admin-user" id="admin-user-info"></div>
      </header>

      <div class="admin-content">
        <div class="report-grid" id="stats-top">
          <div class="report-card card-orange">
            <div class="r-icon">📦</div>
            <div class="num gold" id="r-today-orders">—</div>
            <div class="label">Pedidos Hoy</div>
          </div>
          <div class="report-card card-blue">
            <div class="r-icon">📋</div>
            <div class="num blue" id="r-total-orders">—</div>
            <div class="label">Total Pedidos</div>
          </div>
          <div class="report-card card-green">
            <div class="r-icon">✅</div>
            <div class="num green" id="r-completed">—</div>
            <div class="label">Completados</div>
          </div>
          <div class="report-card card-gold">
            <div class="r-icon">💰</div>
            <div class="num gold" id="r-revenue-today">—</div>
            <div class="label">Ingresos Hoy</div>
            <div class="ingresos-total">
              <div class="label-small">Total histórico</div>
              <div class="num-big" id="r-revenue-total"></div>
            </div>
          </div>
        </div>

        <div class="report-bottom">
          <div class="report-panel">
            <h3>📦 Estado de pedidos</h3>
            <div class="report-panel-body">
              <div class="status-chart" id="status-chart"></div>
            </div>
          </div>

          <div class="report-panel">
            <h3>🔥 Platillos más populares</h3>
            <div class="report-panel-body">
              <ul class="popular-list" id="popular-list"></ul>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="app.js?v=6"></script>
  <script>
    function getMedal(i) {
      if (i === 0) return '🥇';
      if (i === 1) return '🥈';
      if (i === 2) return '🥉';
      return '';
    }

    function getRankClass(i) {
      if (i === 0) return 'gold';
      if (i === 1) return 'silver';
      if (i === 2) return 'bronze';
      return 'normal';
    }

    async function loadReportes() {
      try {
        const data = await apiFetch('/api/admin/reportes');

        document.getElementById('r-today-orders').textContent = data.ordersToday ?? 0;
        document.getElementById('r-total-orders').textContent = data.totalOrders ?? 0;
        document.getElementById('r-completed').textContent = data.completedOrders ?? 0;
        document.getElementById('r-revenue-today').textContent = `C$${(data.revenueToday || 0).toFixed(2)}`;
        document.getElementById('r-revenue-total').textContent = `C$${(data.totalRevenue || 0).toFixed(2)}`;

        const byStatus = data.byStatus || {};
        const total = Object.values(byStatus).reduce((a, b) => a + b, 0) || 1;
        const orderLabels = { pendiente: 'Pendiente', preparando: 'Preparando', servido: 'Servido', cancelado: 'Cancelado' };
        const orderColors = { pendiente: 'pendiente', preparando: 'preparando', servido: 'servido', cancelado: 'cancelado' };

        const chart = document.getElementById('status-chart');
        chart.innerHTML = Object.entries(byStatus).map(([s, c]) => `
          <div class="status-row">
            <span class="s-label">${orderLabels[s] || s}</span>
            <div class="s-bar-wrap">
              <div class="s-bar ${orderColors[s]}" style="width:${(c / total) * 100}%"></div>
            </div>
            <span class="s-count">${c}</span>
          </div>
        `).join('') || '<div style="color:var(--muted);text-align:center;padding:10px 0;">Sin datos</div>';

        const items = data.popularItems || [];
        const popularList = document.getElementById('popular-list');
        if (!items.length) {
          popularList.innerHTML = '<li style="color:var(--muted);text-align:center;padding:20px 0;justify-content:center;">Sin datos</li>';
        } else {
          popularList.innerHTML = items.map((i, idx) => `
            <li>
              <span class="rank ${getRankClass(idx)}">${getMedal(idx) || (idx + 1)}</span>
              <span class="p-name">${i.name}</span>
              <span class="p-count">${i.count}</span>
            </li>
          `).join('');
        }
      } catch (e) {
        showToast('Error al cargar reportes', 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadReportes();
      setInterval(loadReportes, 60000);

      escucharSocket('new-order', loadReportes);
      escucharSocket('order-status', loadReportes);
    });
  </script>
</body>
</html>
