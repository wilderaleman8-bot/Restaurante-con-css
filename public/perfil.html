  <style>
    .profile-wrap{max-width:520px;margin:100px auto 36px;padding:0 16px}
    .profile-card{background:#fff;border-radius:20px;box-shadow:0 2px 20px rgba(90,64,54,.08);padding:40px 36px 32px;position:relative;overflow:hidden}
    .profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--wood),var(--accent),var(--olive))}
    .profile-card h2{font-family:var(--font-heading);color:var(--wood);font-size:1.6rem;text-align:center;margin:0 0 2px;letter-spacing:-.3px}
    .profile-card .sub{color:#8a7a6a;text-align:center;font-size:.85rem;margin:0 0 28px}
    .avatar-section{text-align:center;margin-bottom:28px;position:relative}
    .avatar-wrap{width:108px;height:108px;border-radius:50%;margin:0 auto 14px;overflow:hidden;border:3px solid var(--olive);background:#f0ece6;position:relative;cursor:pointer;transition:var(--transition);box-shadow:0 4px 14px rgba(90,64,54,.1)}
    .avatar-wrap:hover{border-color:var(--accent);transform:scale(1.03);box-shadow:0 6px 20px rgba(90,64,54,.15)}
    .avatar-wrap img{width:100%;height:100%;object-fit:cover;display:block}
    .avatar-wrap .avatar-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.4rem;font-weight:700;color:var(--wood);background:linear-gradient(135deg,#f0ece6,#e8e2da)}
    .avatar-overlay{position:absolute;inset:0;border-radius:50%;background:rgba(90,64,54,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;color:#fff;font-size:.75rem;font-weight:600;letter-spacing:.3px;backdrop-filter:blur(2px)}
    .avatar-wrap:hover .avatar-overlay{opacity:1}
    .avatar-section .hint{font-size:.75rem;color:#a99988;margin-top:0}
    .profile-form{display:flex;flex-direction:column;gap:0}
    .input-group{position:relative;margin-bottom:18px}
    .input-group label{display:block;font-weight:600;margin-bottom:5px;color:var(--wood);font-size:.82rem;letter-spacing:.2px}
    .input-group .input-wrap{position:relative}
    .input-group .input-wrap .icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.4;pointer-events:none;line-height:1}
    .input-group input{width:100%;padding:11px 14px 11px 40px;border-radius:10px;border:1.5px solid #e0dbd5;font-size:.9rem;outline:none;transition:var(--transition);background:var(--bg);color:#2a1a0e}
    .input-group input:focus{border-color:var(--olive);box-shadow:0 0 0 3px rgba(158,179,132,.15);background:#fff}
    .input-group input::placeholder{color:#bbb}
    .btn-save{width:100%;background:linear-gradient(135deg,var(--wood),#6a4532);color:#fff;border:none;padding:13px;border-radius:10px;font-weight:600;font-size:.95rem;cursor:pointer;transition:var(--transition);margin-top:4px;position:relative;overflow:hidden}
    .btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(90,64,54,.25)}
    .btn-save:active{transform:translateY(0)}
    .btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .profile-meta{display:flex;justify-content:center;gap:20px;margin-top:24px;padding-top:20px;border-top:1px solid #f0ece6;font-size:.78rem;color:#a99988;flex-wrap:wrap}
    .profile-meta span{display:inline-flex;align-items:center;gap:4px}
    .profile-meta .dot{display:inline-block;width:4px;height:4px;border-radius:50%;background:#d4c5b5;margin:0 4px}
    @media(max-width:480px){.profile-card{padding:28px 18px 24px}.profile-wrap{margin:20px auto}.profile-card h2{font-size:1.25rem}.avatar-wrap{width:88px;height:88px}.avatar-wrap .avatar-placeholder{font-size:1.8rem}.input-group input{padding:10px 12px 10px 36px;font-size:.85rem}.profile-meta{gap:12px;flex-direction:column;align-items:center}}
  </style>

  <script>
    (function(){
      const card = document.getElementById('profile-card');

      if (!getToken()) {
        window.location.href = 'login.html';
        return;
      }

      async function cargarPerfil() {
        try {
          const res = await fetch('/api/usuarios/me', {
            headers: { 'Authorization': `Bearer ${getToken()}` }
          });
          if (!res.ok) throw new Error('No autorizado');
          const user = await res.json();
          renderizarPerfil(user);
        } catch {
          window.location.href = 'login.html';
        }
      }

      function getInitials(name) {
        if (!name) return '?';
        return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      }

      function renderizarPerfil(user) {
        const initials = getInitials(user.nombre);
        const avatarContent = user.image_path
          ? `<img src="/uploads/${user.image_path}" alt="${user.nombre}">`
          : `<div class="avatar-placeholder">${initials}</div>`;

        card.innerHTML = `
          <h2>Mi Perfil</h2>
          <p class="sub">Administra tu información personal</p>

          <div class="avatar-section">
            <div class="avatar-wrap" id="avatar-preview">
              ${avatarContent}
              <div class="avatar-overlay">Cambiar</div>
            </div>
            <p class="hint">Toca la foto para cambiarla</p>
            <input type="file" id="avatar-input" accept="image/*" style="display:none">
          </div>

          <form class="profile-form" id="profile-form">
            <div class="input-group">
              <label for="input-nombre">Nombre</label>
              <div class="input-wrap">
                <span class="icon">👤</span>
                <input type="text" id="input-nombre" value="${user.nombre || ''}" required maxlength="100" placeholder="Tu nombre">
              </div>
            </div>
            <div class="input-group">
              <label for="input-email">Correo electrónico</label>
              <div class="input-wrap">
                <span class="icon">✉️</span>
                <input type="email" id="input-email" value="${user.email || ''}" required maxlength="100" placeholder="tu@correo.com">
              </div>
            </div>
            <button type="submit" class="btn-save" id="btn-save">Guardar cambios</button>
          </form>

          <div class="profile-meta">
            <span>📅 Miembro desde ${user.created_at ? new Date(user.created_at).toLocaleDateString('es-ES', {year:'numeric',month:'long'}) : '—'}</span>
            <span class="dot"></span>
            <span>🏷️ ${user.rol === 'admin' ? 'Administrador' : 'Cliente'}</span>
          </div>
        `;

        const avatarWrap = document.getElementById('avatar-preview');
        const avatarInput = document.getElementById('avatar-input');

        avatarWrap.addEventListener('click', () => avatarInput.click());

        avatarInput.addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function(ev) {
            avatarWrap.innerHTML = `<img src="${ev.target.result}" alt="Vista previa"><div class="avatar-overlay">Cambiar</div>`;
          };
          reader.readAsDataURL(file);
        });

        document.getElementById('profile-form').addEventListener('submit', async function(e) {
          e.preventDefault();
          const btn = document.getElementById('btn-save');
          const nombre = document.getElementById('input-nombre').value.trim();
          const email = document.getElementById('input-email').value.trim();
          const avatarFile = avatarInput.files[0];

          setLoading(btn, true);

          try {
            const formData = new FormData();
            formData.append('nombre', nombre);
            formData.append('email', email);
            if (avatarFile) formData.append('image', avatarFile);

            const res = await fetch(`/api/usuarios/${user.id}`, {
              method: 'PATCH',
              headers: { 'Authorization': `Bearer ${getToken()}` },
              body: formData
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Error al actualizar');

            setToken(data.token);
            localStorage.setItem('usuario', JSON.stringify(data.usuario));
            localStorage.setItem('saboresUser', JSON.stringify(data.usuario));
            showToast('Perfil actualizado correctamente', 'success');
          } catch(err) {
            showToast(err.message, 'error');
          } finally {
            setLoading(btn, false);
          }
        });
      }

      cargarPerfil();
    })();
  </script>
